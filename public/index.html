<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="description" content="CloudTakeoff Pro - Enterprise Construction Plan Measurement & Takeoff Software" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>CloudTakeoff Pro - Digital Construction Takeoffs</title>
  
  <style>
    :root {
      --primary: #0066dd;
      --primary-dark: #0052b0;
      --secondary: #ff6b35;
      --success: #2ecc71;
      --danger: #e74c3c;
      --warning: #f39c12;
      --bg-dark: #0f0f0f;
      --bg-light: #1a1a1a;
      --surface: #2a2a2a;
      --surface-light: #3a3a3a;
      --text-primary: #e0e0e0;
      --text-secondary: #b0b0b0;
      --border: #404040;
      --shadow: 0 2px 8px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.6);
    }

    * { box-sizing: border-box; }
    html, body { 
      height: 100vh; margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    body { 
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    #header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      z-index: 100;
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo { font-size: 18px; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
    .project-name { font-size: 13px; color: var(--text-secondary); }

    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-btn { 
      background: var(--surface-light); 
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .header-btn:hover { 
      background: var(--primary);
      border-color: var(--primary);
    }

    /* Main container */
    #container {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      flex: 0 0 320px;
      background: var(--bg-light);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      z-index: 50;
    }

    .sidebar-section {
      border-bottom: 1px solid var(--border);
      padding: 16px;
    }

    .sidebar-section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 1px;
      margin: 0 0 12px 0;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="file"],
    input[type="number"],
    input[type="text"],
    select {
      width: 100%;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.2s;
    }

    input[type="file"] {
      padding: 8px;
      cursor: pointer;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 102, 221, 0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      background: var(--surface-light);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    button.secondary:hover {
      background: var(--surface);
      border-color: var(--primary);
    }

    button.danger {
      background: var(--danger);
    }

    button.danger:hover {
      background: #c0392b;
    }

    button.success {
      background: var(--success);
    }

    button.success:hover {
      background: #27ae60;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .button-group.full {
      grid-template-columns: 1fr;
    }

    /* Tool toggle buttons */
    .tool-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .tool-btn {
      padding: 10px;
      font-size: 12px;
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--text-primary);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
    }

    .tool-btn:hover {
      border-color: var(--text-secondary);
    }

    .tool-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* Canvas area */
    #canvas-container {
      position: relative;
      flex: 1;
      background: #141414;
      overflow: auto;
      z-index: 30;
    }

    #canvas-container canvas {
      position: absolute;
      top: 0;
      left: 0;
      image-rendering: crisp-edges;
      transform-origin: 0 0;
    }

    /* Status indicator */
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      padding: 8px;
      background: var(--surface);
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }

    .status-dot.active {
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Results panel */
    #results-panel {
      flex: 0 0 200px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: none;
    }

    #results-panel.active {
      display: flex;
      flex-direction: column;
    }

    .result-area {
      margin-bottom: 12px;
      padding: 10px;
      background: var(--surface-light);
      border-radius: 6px;
      border-left: 3px solid var(--primary);
      font-size: 12px;
    }

    .result-area-title {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .result-area-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
    }

    .result-total {
      padding: 12px;
      background: var(--primary);
      color: white;
      border-radius: 6px;
      margin-top: 16px;
    }

    .result-total-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 6px;
    }

    .result-total-value {
      font-size: 18px;
      font-weight: 700;
    }

    /* Alerts and notifications */
    .alert {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
      border-left: 4px solid;
    }

    .alert.info {
      background: rgba(0, 102, 221, 0.1);
      border-left-color: var(--primary);
      color: var(--primary);
    }

    .alert.success {
      background: rgba(46, 204, 113, 0.1);
      border-left-color: var(--success);
      color: var(--success);
    }

    .alert.warning {
      background: rgba(243, 156, 18, 0.1);
      border-left-color: var(--warning);
      color: var(--warning);
    }

    .alert.error {
      background: rgba(231, 76, 60, 0.1);
      border-left-color: var(--danger);
      color: var(--danger);
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--surface);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      #sidebar {
        flex: 0 0 280px;
      }
    }

    @media (max-width: 768px) {
      #container {
        flex-direction: column;
      }

      #sidebar {
        flex: 0 0 auto;
        max-height: 40vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      #canvas-container {
        flex: 1;
      }

      #results-panel {
        flex: 0 0 auto;
        max-height: 60vh;
        border-left: none;
        border-top: 1px solid var(--border);
      }
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .loading::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div id="header">
    <div class="header-left">
      <div class="logo">☁ CloudTakeoff Pro</div>
      <div class="project-name">Construction Measurement Suite</div>
    </div>
    <div class="header-right">
      <button class="header-btn" id="toggle-results">📊 Results</button>
      <button class="header-btn" id="export-btn">⬇️ Export</button>
      <button class="header-btn" id="help-btn">❓ Help</button>
    </div>
  </div>

  <!-- Main container -->
  <div id="container">
    <!-- Sidebar -->
    <div id="sidebar">
      <!-- File Upload -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">📁 Project File</div>
        <div class="form-group">
          <input type="file" id="upload" accept="application/pdf,image/*" />
          <div class="status-indicator">
            <span class="status-dot"></span>
            <span id="upload-status">Ready</span>
          </div>
        </div>
      </div>

      <!-- Scale Setup -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">📏 Scale Setup</div>
        
        <button id="draw-scale-line" class="tool-btn">Draw Scale Line</button>
        
        <div class="form-group" style="margin-top: 12px;">
          <label>Real Distance (m)</label>
          <input type="number" id="real-distance" value="1" step="0.1" min="0.1" />
        </div>

        <div class="button-group">
          <button id="set-scale" class="secondary">Set Scale</button>
          <button id="reset-scale" class="secondary">Reset</button>
        </div>

        <div class="status-indicator" style="margin-top: 12px;">
          <span style="font-weight: 600;">Scale:</span>
          <span id="scale-display">Not Set</span>
        </div>
      </div>

      <!-- View Controls -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">🔍 View</div>
        <div class="button-group">
          <button id="zoom-in">+ Zoom In</button>
          <button id="zoom-out">− Zoom Out</button>
        </div>
        <button id="fit-view" class="secondary" style="margin-top: 8px;">Fit to View</button>
        <button id="free-cursor" class="secondary" style="margin-top: 8px;">Pan Mode</button>
      </div>

      <!-- Measurement Tools -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">📐 Tools</div>
        <div class="tool-buttons">
          <button class="tool-btn" data-mode="measure">📏 Measure</button>
          <button class="tool-btn" data-mode="line">📍 Line</button>
          <button class="tool-btn" data-mode="text">T Text</button>
          <button class="tool-btn" data-mode="highlight">🖍️ Mark</button>
        </div>
      </div>

      <!-- Area Drawing -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">🎯 Area Drawing</div>
        <div class="form-group">
          <label>Thickness (m)</label>
          <input type="number" id="thickness" value="0.1" step="0.01" min="0.01" />
        </div>
        <div class="form-group">
          <label>Color</label>
          <select id="color">
            <option>Red</option>
            <option>Green</option>
            <option>Blue</option>
            <option>Orange</option>
            <option>Purple</option>
            <option>Teal</option>
          </select>
        </div>
        <div class="button-group">
          <button id="start" class="success">Start Area</button>
          <button id="finish" class="secondary">Finish</button>
        </div>
        <button id="reset" class="danger" style="margin-top: 8px;">Clear All</button>
      </div>

      <!-- Zone Management -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">📍 Zones</div>
        <div class="form-group">
          <select id="current-zone">
            <option value="1">Zone 1</option>
          </select>
        </div>
        <div class="button-group">
          <button id="add-zone" class="secondary">+ Zone</button>
          <button id="delete-zone" class="danger">Delete</button>
        </div>
      </div>

      <!-- Export -->
      <div class="sidebar-section" style="margin-top: auto;">
        <div class="sidebar-section-title">⬇️ Export</div>
        <button id="save-pdf" class="success">Export PDF</button>
        <button id="export-csv" class="secondary" style="margin-top: 8px;">Export CSV</button>
      </div>
    </div>

    <!-- Canvas Container -->
    <div id="canvas-container">
      <canvas id="pdf-canvas"></canvas>
      <canvas id="draw-canvas"></canvas>
    </div>

    <!-- Results Panel -->
    <div id="results-panel">
      <div class="sidebar-section-title">📊 Results</div>
      <div id="results" style="flex: 1;">
        <div class="alert info">No areas measured yet</div>
      </div>
    </div>
  </div>

  <!-- External Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/martinez-polygon-clipping@0.7.1/dist/martinez.min.js"></script>

  <script>
    // Configure PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ==================== STATE ====================
    let appState = {
      pdfDoc: null,
      pageNum: 1,
      pdfScale: 1.0,
      panOffset: { x: 0, y: 0 },
      isPanning: false,
      isPanMode: true,
      
      zones: { 1: [] },
      currentZone: 1,
      
      drawing: false,
      scaleMode: false,
      annotationMode: null,
      
      currentPoints: [],
      scaleLine: [],
      pixelsPerMeter: 1,
      
      annotations: [],
      selectedAnnotation: null,
      highlighterColor: '#ffff00',
      
      lastCursorPos: null,
      clickFlashPoints: [],
      livePreviewPoint: null,
      liveDistance: null,
    };

    // ==================== DOM ELEMENTS ====================
    const pdfCanvas = document.getElementById('pdf-canvas');
    const drawCanvas = document.getElementById('draw-canvas');
    const ctxPDF = pdfCanvas.getContext('2d');
    const ctxDraw = drawCanvas.getContext('2d');
    const upload = document.getElementById('upload');
    const resultsDiv = document.getElementById('results');

    const colors = {
      Red: 'rgba(255,0,0,0.4)',
      Green: 'rgba(0,255,0,0.4)',
      Blue: 'rgba(0,0,255,0.4)',
      Orange: 'rgba(255,165,0,0.4)',
      Purple: 'rgba(128,0,128,0.4)',
      Teal: 'rgba(0,128,128,0.4)'
    };

    const solidColors = {
      Red: '#ff0000',
      Green: '#00ff00',
      Blue: '#0000ff',
      Orange: '#ffa500',
      Purple: '#800080',
      Teal: '#008080'
    };

    // ==================== INITIALIZATION ====================
    function init() {
      setupEventListeners();
      setupCanvasResizing();
      updateUI();
    }

    function setupEventListeners() {
      upload.addEventListener('change', handleFileUpload);
      document.getElementById('draw-scale-line').addEventListener('click', () => startScaleMode());
      document.getElementById('set-scale').addEventListener('click', setScale);
      document.getElementById('reset-scale').addEventListener('click', resetScale);
      document.getElementById('zoom-in').addEventListener('click', () => zoom(1.2));
      document.getElementById('zoom-out').addEventListener('click', () => zoom(0.83));
      document.getElementById('fit-view').addEventListener('click', fitToView);
      document.getElementById('free-cursor').addEventListener('click', togglePanMode);
      document.getElementById('start').addEventListener('click', startDrawing);
      document.getElementById('finish').addEventListener('click', finishArea);
      document.getElementById('reset').addEventListener('click', () => {
        if (confirm('Clear all areas?')) {
          appState.zones = { 1: [] };
          updateUI();
          redraw();
        }
      });

      document.getElementById('add-zone').addEventListener('click', addZone);
      document.getElementById('delete-zone').addEventListener('click', deleteZone);
      document.getElementById('current-zone').addEventListener('change', (e) => {
        appState.currentZone = parseInt(e.target.value);
        updateUI();
      });

      document.getElementById('save-pdf').addEventListener('click', exportPDF);
      document.getElementById('export-csv').addEventListener('click', exportCSV);
      document.getElementById('toggle-results').addEventListener('click', () => {
        document.getElementById('results-panel').classList.toggle('active');
      });

      document.querySelectorAll('.tool-btn[data-mode]').forEach(btn => {
        btn.addEventListener('click', () => {
          appState.annotationMode = btn.getAttribute('data-mode');
          appState.drawing = false;
          appState.scaleMode = false;
          appState.isPanMode = false;
          updateUI();
        });
      });

      // Canvas events
      drawCanvas.addEventListener('mousemove', handleMouseMove);
      drawCanvas.addEventListener('click', handleCanvasClick);
      drawCanvas.addEventListener('dblclick', finishArea);
      drawCanvas.addEventListener('mousewheel', handleMouseWheel, { passive: false });
    }

    function setupCanvasResizing() {
      window.addEventListener('resize', () => {
        if (appState.pdfDoc) fitToView();
      });
    }

    // ==================== FILE HANDLING ====================
    async function handleFileUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      resetAppState();
      updateUploadStatus('Loading...');

      try {
        if (file.type === 'application/pdf') {
          await loadPDF(file);
        } else if (file.type.startsWith('image/')) {
          await loadImage(file);
        } else {
          throw new Error('Unsupported file type. Please upload a PDF or image.');
        }
        updateUploadStatus('Ready');
      } catch (error) {
        updateUploadStatus('Error: ' + error.message, 'error');
        alert('Error loading file: ' + error.message);
      }
    }

    async function loadPDF(file) {
      const arrayBuffer = await file.arrayBuffer();
      const typedarray = new Uint8Array(arrayBuffer);
      appState.pdfDoc = await pdfjsLib.getDocument(typedarray).promise;
      appState.pageNum = 1;
      renderPage(appState.pageNum);
    }

    async function loadImage(file) {
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      
      const img = new Image();
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = dataUrl;
      });

      pdfCanvas.width = img.width;
      pdfCanvas.height = img.height;
      drawCanvas.width = img.width;
      drawCanvas.height = img.height;
      ctxPDF.drawImage(img, 0, 0);
      fitToView();
      redraw();
    }

    async function renderPage(pageNum) {
      if (!appState.pdfDoc) return;
      const page = await appState.pdfDoc.getPage(pageNum);
      const viewport = page.getViewport({ scale: 1.0 });
      
      pdfCanvas.width = viewport.width;
      pdfCanvas.height = viewport.height;
      drawCanvas.width = viewport.width;
      drawCanvas.height = viewport.height;
      
      ctxPDF.clearRect(0, 0, pdfCanvas.width, pdfCanvas.height);
      
      const renderContext = { canvasContext: ctxPDF, viewport };
      await page.render(renderContext).promise;
      
      updateCanvasTransforms();
      redraw();
      
      if (!window._fitOnce) {
        window._fitOnce = true;
        setTimeout(() => fitToView(), 100);
      }
    }

    // ==================== SCALE SETUP ====================
    function startScaleMode() {
      appState.scaleMode = true;
      appState.drawing = false;
      appState.annotationMode = null;
      appState.isPanMode = false;
      appState.scaleLine = [];
      updateUI();
      alert('Click two points to set the scale line for measurements');
    }

    function setScale() {
      if (appState.scaleLine.length !== 2) {
        alert('Draw a scale line first');
        return;
      }
      const realDistance = parseFloat(document.getElementById('real-distance').value);
      if (!realDistance || realDistance <= 0) {
        alert('Enter a valid distance');
        return;
      }
      const pixelDistance = Math.hypot(
        appState.scaleLine[1].x - appState.scaleLine[0].x,
        appState.scaleLine[1].y - appState.scaleLine[0].y
      );
      appState.pixelsPerMeter = pixelDistance / realDistance;
      document.getElementById('scale-display').textContent = `1m = ${appState.pixelsPerMeter.toFixed(2)}px`;
      appState.scaleMode = false;
      appState.isPanMode = true;
      updateUI();
      alert(`Scale set: 1 meter = ${appState.pixelsPerMeter.toFixed(2)} pixels`);
    }

    function resetScale() {
      appState.scaleLine = [];
      appState.pixelsPerMeter = 1;
      document.getElementById('scale-display').textContent = 'Not Set';
      updateUI();
      redraw();
    }

    // ==================== ZOOM & PAN ====================
    function zoom(factor) {
      const old = appState.pdfScale;
      const newScale = Math.min(10, Math.max(0.1, old * factor));
      if (newScale === old) return;

      const ratio = newScale / old;
      const container = document.getElementById('canvas-container');
      const centerX = container.clientWidth / 2;
      const centerY = container.clientHeight / 2;

      appState.panOffset.x = centerX - (centerX - appState.panOffset.x) * ratio;
      appState.panOffset.y = centerY - (centerY - appState.panOffset.y) * ratio;
      appState.pdfScale = newScale;

      updateCanvasTransforms();
      redraw();
    }

    function fitToView() {
      if (!appState.pdfDoc && !pdfCanvas.width) return;
      const viewport = appState.pdfDoc ? 
        pdfjsLib.getViewport ? { width: pdfCanvas.width, height: pdfCanvas.height } :
        { width: pdfCanvas.width, height: pdfCanvas.height } :
        { width: pdfCanvas.width, height: pdfCanvas.height };

      const container = document.getElementById('canvas-container');
      const scaleX = container.clientWidth / viewport.width;
      const scaleY = container.clientHeight / viewport.height;
      appState.pdfScale = Math.min(scaleX, scaleY);
      appState.panOffset = { x: 0, y: 0 };

      updateCanvasTransforms();
      redraw();
    }

    function updateCanvasTransforms() {
      const transform = `translate(${appState.panOffset.x}px, ${appState.panOffset.y}px) scale(${appState.pdfScale})`;
      pdfCanvas.style.transform = transform;
      drawCanvas.style.transform = transform;
    }

    function togglePanMode() {
      appState.isPanMode = !appState.isPanMode;
      if (appState.isPanMode) {
        appState.drawing = false;
        appState.scaleMode = false;
        appState.annotationMode = null;
      }
      updateUI();
    }

    // ==================== DRAWING ====================
    function startDrawing() {
      if (appState.pixelsPerMeter <= 0) {
        alert('Set scale first');
        return;
      }
      appState.drawing = true;
      appState.scaleMode = false;
      appState.annotationMode = null;
      appState.isPanMode = false;
      appState.currentPoints = [];
      updateUI();
      alert('Click points to create an area. Double-click or press Enter when done.');
    }

    function finishArea() {
      if (appState.drawing && appState.currentPoints.length >= 3) {
        const area = calculateArea(appState.currentPoints);
        const volume = area * parseFloat(document.getElementById('thickness').value);
        
        appState.zones[appState.currentZone].push({
          points: [...appState.currentPoints],
          area,
          volume,
          thickness: parseFloat(document.getElementById('thickness').value),
          color: document.getElementById('color').value,
          number: appState.zones[appState.currentZone].length + 1
        });

        appState.currentPoints = [];
        appState.drawing = false;
        appState.isPanMode = true;
        updateUI();
        redraw();
      }
    }

    function calculateArea(points) {
      let area = 0;
      for (let i = 0; i < points.length; i++) {
        const j = (i + 1) % points.length;
        area += points[i].x * points[j].y - points[j].x * points[i].y;
      }
      area = Math.abs(area) / 2;
      return area / (appState.pixelsPerMeter * appState.pixelsPerMeter);
    }

    // ==================== ZONE MANAGEMENT ====================
    function addZone() {
      const newZoneId = Math.max(...Object.keys(appState.zones).map(Number), 0) + 1;
      appState.zones[newZoneId] = [];
      appState.currentZone = newZoneId;
      updateUI();
    }

    function deleteZone() {
      if (Object.keys(appState.zones).length <= 1) {
        alert('Cannot delete the only zone');
        return;
      }
      if (appState.zones[appState.currentZone].length > 0) {
        if (!confirm(`Zone ${appState.currentZone} has areas. Delete anyway?`)) return;
      }
      delete appState.zones[appState.currentZone];
      const remainingZones = Object.keys(appState.zones).map(Number);
      appState.currentZone = Math.min(...remainingZones);
      updateUI();
    }

    // ==================== MOUSE HANDLERS ====================
    function getMousePos(e) {
      const rect = drawCanvas.getBoundingClientRect();
      const scaleX = drawCanvas.width / rect.width;
      const scaleY = drawCanvas.height / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;
      return { x, y };
    }

    function handleMouseMove(e) {
      const pos = getMousePos(e);
      appState.lastCursorPos = pos;

      if (appState.isPanning) {
        const dx = e.clientX - appState.lastPanPoint.x;
        const dy = e.clientY - appState.lastPanPoint.y;
        appState.panOffset.x += dx;
        appState.panOffset.y += dy;
        appState.lastPanPoint = { x: e.clientX, y: e.clientY };
        updateCanvasTransforms();
        redraw();
        return;
      }

      if (appState.scaleMode && appState.scaleLine.length === 1) {
        appState.livePreviewPoint = pos;
        redraw();
        return;
      }

      if ((appState.drawing || appState.annotationMode === 'measure') && appState.currentPoints.length > 0) {
        appState.livePreviewPoint = pos;
        redraw();
        return;
      }

      redraw();
    }

    function handleCanvasClick(e) {
      if (appState.isPanMode && !appState.scaleMode && !appState.drawing && !appState.annotationMode) {
        if (e.button === 0) {
          appState.isPanning = true;
          appState.lastPanPoint = { x: e.clientX, y: e.clientY };
        }
        return;
      }

      const pos = getMousePos(e);

      // Scale mode
      if (appState.scaleMode) {
        if (appState.scaleLine.length < 2) {
          appState.scaleLine.push(pos);
          if (appState.scaleLine.length === 2) {
            alert('Scale line set. Now enter the real distance and click "Set Scale"');
            appState.scaleMode = false;
            appState.isPanMode = true;
            updateUI();
          }
        }
        redraw();
        return;
      }

      // Drawing mode
      if (appState.drawing) {
        appState.currentPoints.push(pos);
        appState.clickFlashPoints.push({ x: pos.x, y: pos.y, t0: performance.now() });
        redraw();
        return;
      }

      // Annotation mode
      if (appState.annotationMode === 'measure' || appState.annotationMode === 'line') {
        if (!appState.annotationStartPoint) {
          appState.annotationStartPoint = pos;
        } else {
          appState.annotations.push({
            type: appState.annotationMode,
            start: appState.annotationStartPoint,
            end: pos,
            color: document.getElementById('line-color').value
          });
          appState.annotationStartPoint = null;
          redraw();
        }
        return;
      }
    }

    function handleMouseWheel(e) {
      e.preventDefault();
      const factor = e.deltaY > 0 ? 0.9 : 1.1;
      zoom(factor);
    }

    // ==================== RENDERING ====================
    function redraw() {
      ctxDraw.clearRect(0, 0, drawCanvas.width, drawCanvas.height);

      // Scale line
      if (appState.scaleLine.length >= 1) {
        ctxDraw.strokeStyle = '#ff0000';
        ctxDraw.lineWidth = 3;
        ctxDraw.setLineDash([]);
        ctxDraw.beginPath();
        ctxDraw.moveTo(appState.scaleLine[0].x, appState.scaleLine[0].y);
        if (appState.scaleLine.length === 2) {
          ctxDraw.lineTo(appState.scaleLine[1].x, appState.scaleLine[1].y);
        } else if (appState.livePreviewPoint) {
          ctxDraw.lineTo(appState.livePreviewPoint.x, appState.livePreviewPoint.y);
          ctxDraw.setLineDash([5, 5]);
        }
        ctxDraw.stroke();
      }

      // Existing areas
      Object.entries(appState.zones).forEach(([zoneId, areas]) => {
        areas.forEach((area) => {
          ctxDraw.fillStyle = colors[area.color];
          ctxDraw.strokeStyle = '#000';
          ctxDraw.lineWidth = 1;
          ctxDraw.beginPath();
          area.points.forEach((pt, i) => {
            if (i === 0) ctxDraw.moveTo(pt.x, pt.y);
            else ctxDraw.lineTo(pt.x, pt.y);
          });
          ctxDraw.closePath();
          ctxDraw.fill();
          ctxDraw.stroke();

          // Label
          let cx = 0, cy = 0;
          area.points.forEach(p => {
            cx += p.x;
            cy += p.y;
          });
          cx /= area.points.length;
          cy /= area.points.length;

          ctxDraw.fillStyle = '#fff';
          ctxDraw.font = 'bold 11px sans-serif';
          ctxDraw.textAlign = 'center';
          ctxDraw.fillText(`${area.area.toFixed(1)}m²`, cx, cy);
          ctxDraw.textAlign = 'start';
        });
      });

      // Live polygon
      if (appState.currentPoints.length > 0 && appState.drawing) {
        ctxDraw.strokeStyle = '#000';
        ctxDraw.lineWidth = 2;
        ctxDraw.beginPath();
        appState.currentPoints.forEach((p, i) => {
          if (i === 0) ctxDraw.moveTo(p.x, p.y);
          else ctxDraw.lineTo(p.x, p.y);
        });
        if (appState.livePreviewPoint) {
          ctxDraw.lineTo(appState.livePreviewPoint.x, appState.livePreviewPoint.y);
          if (appState.currentPoints.length >= 2) {
            ctxDraw.closePath();
            ctxDraw.fillStyle = colors[document.getElementById('color').value];
            ctxDraw.fill();
          }
        }
        ctxDraw.stroke();

        // Points
        ctxDraw.fillStyle = '#ff0000';
        appState.currentPoints.forEach(p => {
          ctxDraw.beginPath();
          ctxDraw.arc(p.x, p.y, 3, 0, Math.PI * 2);
          ctxDraw.fill();
        });
      }

      // Annotations
      appState.annotations.forEach((ann) => {
        if (ann.type === 'measure' || ann.type === 'line') {
          ctxDraw.strokeStyle = ann.color || '#000';
          ctxDraw.lineWidth = 2;
          ctxDraw.beginPath();
          ctxDraw.moveTo(ann.start.x, ann.start.y);
          ctxDraw.lineTo(ann.end.x, ann.end.y);
          ctxDraw.stroke();

          if (ann.type === 'measure') {
            const d = Math.hypot(ann.end.x - ann.start.x, ann.end.y - ann.start.y);
            const realD = d / appState.pixelsPerMeter;
            const midX = (ann.start.x + ann.end.x) / 2;
            const midY = (ann.start.y + ann.end.y) / 2;

            ctxDraw.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctxDraw.font = '12px sans-serif';
            const text = `${realD.toFixed(2)}m`;
            const textWidth = ctxDraw.measureText(text).width;
            ctxDraw.fillRect(midX - textWidth / 2 - 3, midY - 15, textWidth + 6, 14);

            ctxDraw.fillStyle = '#ff0000';
            ctxDraw.fillText(text, midX - textWidth / 2, midY - 5);
          }
        }
      });
    }

    // ==================== EXPORT ====================
    async function exportPDF() {
      if (!appState.pdfDoc && pdfCanvas.width === 0) {
        alert('Please load a PDF first');
        return;
      }
      updateUploadStatus('Exporting...');
      
      try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('landscape', 'mm', 'a4');

        const canvas = document.createElement('canvas');
        canvas.width = pdfCanvas.width;
        canvas.height = pdfCanvas.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(pdfCanvas, 0, 0);
        ctx.drawImage(drawCanvas, 0, 0);

        const imgData = canvas.toDataURL('image/png');
        const imgWidth = 297;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);

        // Add summary page
        pdf.addPage();
        pdf.setFontSize(16);
        pdf.text('Takeoff Summary Report', 20, 20);

        let yPos = 40;
        pdf.setFontSize(12);

        Object.entries(appState.zones).forEach(([zoneId, areas]) => {
          if (areas.length === 0) return;
          
          pdf.text(`Zone ${zoneId}`, 20, yPos);
          yPos += 8;
          pdf.setFontSize(10);

          let zoneTotal = 0;
          areas.forEach(area => {
            pdf.text(`  Area ${area.number}: ${area.area.toFixed(2)}m² × ${area.thickness}m = ${area.volume.toFixed(2)}m³`, 25, yPos);
            yPos += 6;
            zoneTotal += area.volume;
          });

          pdf.text(`  Zone Total: ${zoneTotal.toFixed(2)}m³`, 20, yPos);
          yPos += 10;
          pdf.setFontSize(12);
        });

        const filename = `takeoff-${new Date().toISOString().split('T')[0]}.pdf`;
        pdf.save(filename);
        updateUploadStatus('Ready');
      } catch (error) {
        updateUploadStatus('Export error', 'error');
        alert('Error exporting PDF: ' + error.message);
      }
    }

    function exportCSV() {
      let csv = 'Zone,Area Number,Area (m²),Thickness (m),Volume (m³),Color\n';
      
      Object.entries(appState.zones).forEach(([zoneId, areas]) => {
        areas.forEach(area => {
          csv += `${zoneId},${area.number},${area.area.toFixed(2)},${area.thickness},${area.volume.toFixed(2)},${area.color}\n`;
        });
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `takeoff-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ==================== UI UPDATES ====================
    function updateUI() {
      // Update zone selector
      const zoneSelect = document.getElementById('current-zone');
      const oldValue = zoneSelect.value;
      zoneSelect.innerHTML = '';
      Object.keys(appState.zones).sort((a, b) => a - b).forEach(zoneId => {
        const opt = document.createElement('option');
        opt.value = zoneId;
        opt.textContent = `Zone ${zoneId}`;
        zoneSelect.appendChild(opt);
      });
      zoneSelect.value = appState.currentZone;

      // Update tool buttons
      document.querySelectorAll('.tool-btn[data-mode]').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-mode') === appState.annotationMode);
      });

      // Update pan button
      const panBtn = document.getElementById('free-cursor');
      panBtn.classList.toggle('active', appState.isPanMode);

      // Update results
      updateResults();

      redraw();
    }

    function updateResults() {
      resultsDiv.innerHTML = '';
      let grandArea = 0, grandVolume = 0;

      Object.entries(appState.zones).forEach(([zoneId, areas]) => {
        if (areas.length === 0) return;

        let zoneArea = 0, zoneVolume = 0;
        
        const header = document.createElement('div');
        header.className = 'result-area-title';
        header.textContent = `Zone ${zoneId}`;
        resultsDiv.appendChild(header);

        areas.forEach(area => {
          const item = document.createElement('div');
          item.className = 'result-area';
          item.innerHTML = `
            <div class="result-area-title">${area.color} #${area.number}</div>
            <div style="font-size: 12px; line-height: 1.6;">
              <div>${area.area.toFixed(2)} m²</div>
              <div style="color: #999; font-size: 11px;">× ${area.thickness}m</div>
              <div style="color: var(--primary); font-weight: 600;">${area.volume.toFixed(2)} m³</div>
            </div>
          `;
          resultsDiv.appendChild(item);
          zoneArea += area.area;
          zoneVolume += area.volume;
        });

        const zoneTotals = document.createElement('div');
        zoneTotals.className = 'result-area';
        zoneTotals.style.borderLeftColor = 'var(--warning)';
        zoneTotals.innerHTML = `
          <div class="result-area-title">Zone ${zoneId} Total</div>
          <div>${zoneArea.toFixed(2)} m² | ${zoneVolume.toFixed(2)} m³</div>
        `;
        resultsDiv.appendChild(zoneTotals);

        grandArea += zoneArea;
        grandVolume += zoneVolume;
      });

      if (grandVolume > 0) {
        const grand = document.createElement('div');
        grand.className = 'result-total';
        grand.innerHTML = `
          <div class="result-total-label">PROJECT TOTAL</div>
          <div class="result-total-value">${grandVolume.toFixed(2)} m³</div>
          <div style="font-size: 12px; margin-top: 6px;">${grandArea.toFixed(2)} m²</div>
        `;
        resultsDiv.appendChild(grand);
      } else {
        resultsDiv.innerHTML = '<div class="alert info" style="margin-bottom: 0;">No areas measured yet</div>';
      }
    }

    function updateUploadStatus(text, type = 'normal') {
      const indicator = document.querySelector('#sidebar .status-dot');
      const status = document.getElementById('upload-status');
      status.textContent = text;
      
      indicator.classList.toggle('active', type !== 'error' && text !== 'Error');
    }

    function resetAppState() {
      appState.zones = { 1: [] };
      appState.currentZone = 1;
      appState.drawing = false;
      appState.scaleMode = false;
      appState.annotationMode = null;
      appState.currentPoints = [];
      appState.scaleLine = [];
      appState.pixelsPerMeter = 1;
      appState.annotations = [];
      appState.selectedAnnotation = null;
      appState.pdfScale = 1.0;
      appState.panOffset = { x: 0, y: 0 };
      window._fitOnce = false;
      document.getElementById('scale-display').textContent = 'Not Set';
      updateUI();
    }

    // ==================== STARTUP ====================
    init();

    // Service Worker for offline support (optional)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
